services:
  #Основной сервис PHP (обновлен для CI/CD)
  php:
    build: .
    container_name: lab9_php
    volumes:
      - ./www:/var/www/html
      - ./tests:/var/www/html/tests
    expose:
      - "9000"
    depends_on:
      - db
      - redis
      - elasticsearch
      - clickhouse
      - rabbitmq
    networks:
      - default_network
    environment:
      - PHP_ENV=test
      - DB_HOST=db
      - DB_NAME=lab7_db
      - DB_USER=lab7_user
      - DB_PASSWORD=lab7_pass

  # Web сервер
  web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
      - ./default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - default_network

  # База данных MySQL
  db:
    image: mysql:8.0
    container_name: lab9_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: lab7_db
      MYSQL_USER: lab7_user
      MYSQL_PASSWORD: lab7_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - default_network

  # Adminer для управления БД
  adminer:
    image: adminer
    container_name: lab9_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - db
    networks:
      - default_network

  # Redis
  redis:
    image: redis:7
    container_name: lab9_redis
    ports:
      - "6379:6379"
    networks:
      - default_network

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: lab9_elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    networks:
      - default_network

  # ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: lab9_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - default_network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: lab9_rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - default_network

volumes:
  db_data:

networks:
  default_network:
    driver: bridge